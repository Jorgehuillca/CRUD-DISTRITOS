<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Distrito</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <div class="container container--small">
    <header class="page-header">
      <h1>➕ Nuevo Distrito</h1>
      <a href="/index.html" class="btn btn-secondary">← Volver</a>
    </header>

    <div class="card">
      <div class="form-group">
        <label for="nom_dis">Nombre del Distrito <span class="required">*</span></label>
        <input
          type="text"
          id="nom_dis"
          placeholder="Ej: Miraflores"
          maxlength="100"
        />
        <span class="error-msg" id="errorNombre"></span>
      </div>

      <div class="form-group">
        <label for="cod_postal">Código Postal <span class="required">*</span></label>
        <input
          type="text"
          id="cod_postal"
          placeholder="Ej: 15074"
          maxlength="10"
        />
        <span class="error-msg" id="errorCodigo"></span>
      </div>
      <div class="form-group">
        <label for="poblacion">Población <span class="required">*</span></label>
        <input 
        type="number" 
        id="poblacion" 
        placeholder="Ej: 99337" 
        min="0"
        />
        <span class="error-msg" id="errorPoblacion"></span>
      </div>

      <div class="form-actions">
        <button id="btnGuardar" class="btn btn-primary btn--full">
          💾 Guardar Distrito
        </button>
      </div>

      <div id="mensajeExito" class="alert alert--success hidden">
        ✅ Distrito registrado correctamente. Redirigiendo...
      </div>
      <div id="mensajeError" class="alert alert--error hidden"></div>
    </div>
  </div>

  <script type="module" src="/src/nuevo.js"></script>
</body>
</html>
